<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAILY FOCUS | ログイン</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./提出用共通スタイル.css" />
  </head>
  <body class="auth-page">
    <header class="auth-header">
      <a class="brand" href="./01_提出用画面一覧.html">DAILY FOCUS</a>
      <div class="auth-header__actions">
        <span class="auth-header__text">アカウントをお持ちでないですか？</span>
        <a class="button button--secondary button--small" href="./03_会員登録画面.html">サインアップ</a>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="login-title">
        <div class="auth-card__inner">
          <p class="auth-card__eyebrow">LOGIN</p>
          <h1 id="login-title" class="auth-card__title">サインイン</h1>

          <form class="auth-form">
            <label class="field">
              <span class="field__label">メールアドレス</span>
              <input class="field__input" type="email" placeholder="name@example.com" />
            </label>

            <label class="field">
              <span class="field__label">パスワード</span>
              <input class="field__input" type="password" placeholder="パスワードを入力" />
            </label>

            <button class="button button--primary button--block" type="submit">サインイン</button>
          </form>

          <a class="auth-card__link" href="#">パスワードをお忘れですか？</a>

          <div class="divider" aria-hidden="true">
            <span></span>
            <p>または</p>
            <span></span>
          </div>

          <div class="auth-socials">
            <button class="button button--social" type="button">Google で続ける</button>
            <button class="button button--social" type="button">Apple で続ける</button>
          </div>

          <p class="auth-card__footer">
            アカウントをお持ちでないですか？
            <a href="./03_会員登録画面.html">サインアップ</a>
          </p>
        </div>
      </section>
    </main>
    <script src="./提出用補助スクリプト.js"></script>
  </body>
</html>
