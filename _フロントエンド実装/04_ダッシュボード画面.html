<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAILY FOCUS | 一覧画面</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./提出用共通スタイル.css" />
  </head>
  <body class="app-page">
    <main class="app-shell">
      <section class="schedule-card">
        <header class="schedule-header">
          <p class="schedule-label">SCHEDULE</p>
          <div class="schedule-actions">
            <button class="pill-button pill-button--light" type="button">おすすめスケジュール</button>
            <button class="pill-button pill-button--light" type="button">テンプレート</button>
            <a class="pill-button pill-button--dark" href="./06_タスク編集画面.html">+ 新規タスク</a>
          </div>
        </header>

        <section class="timeline-board" aria-label="タスク一覧">
          <div class="timeline-head">
            <span>TIME</span>
            <span>SCHEDULE</span>
            <span class="timeline-now">Now</span>
          </div>

          <div class="timeline-row">
            <div class="timeline-hour">09:00</div>
            <article class="task-card task-card--compact">
              <div class="task-card__dot"></div>
              <div class="task-card__content">
                <h2>テスト</h2>
                <p>08:45 - 09:15</p>
              </div>
            </article>
          </div>

          <div class="timeline-row">
            <div class="timeline-hour">10:00</div>
            <article class="task-card">
              <div class="task-card__dot"></div>
              <div class="task-card__content">
                <h2><a href="./05_タスク詳細画面.html">重要タスク</a></h2>
                <p>09:30 - 11:00</p>
                <span class="task-tag">Deep Work</span>
              </div>
            </article>
          </div>

          <div class="timeline-row timeline-row--now">
            <div class="timeline-hour"><span class="timeline-badge">NOW</span>11:00</div>
            <article class="task-card task-card--compact task-card--active">
              <div class="task-card__dot task-card__dot--warning"></div>
              <div class="task-card__content">
                <h2>連絡・整理</h2>
                <p>11:00 - 11:30</p>
              </div>
            </article>
          </div>

          <div class="timeline-row">
            <div class="timeline-hour">12:00</div>
            <article class="task-card task-card--compact">
              <div class="task-card__dot"></div>
              <div class="task-card__content">
                <h2>集中タスク</h2>
                <p>11:30 - 12:30</p>
              </div>
            </article>
          </div>
        </section>

        <nav class="page-links" aria-label="提出用画面リンク">
          <a href="./01_提出用画面一覧.html">提出用トップ</a>
          <a href="./02_ログイン画面.html">ログイン</a>
          <a href="./03_会員登録画面.html">会員登録</a>
          <a href="./05_タスク詳細画面.html">詳細</a>
          <a href="./06_タスク編集画面.html">編集</a>
        </nav>
      </section>
    </main>
  </body>
</html>
