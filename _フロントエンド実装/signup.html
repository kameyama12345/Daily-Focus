<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAILY FOCUS | 会員登録</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="auth-page">
    <header class="auth-header">
      <a class="brand" href="./index.html">DAILY FOCUS</a>
      <div class="auth-header__actions">
        <span class="auth-header__text">既にアカウントをお持ちですか？</span>
        <a class="button button--secondary button--small" href="./login.html">サインイン</a>
      </div>
    </header>

    <main class="auth-main">
      <section class="auth-card" aria-labelledby="signup-title">
        <div class="auth-card__inner">
          <p class="auth-card__eyebrow">SIGN UP</p>
          <h1 id="signup-title" class="auth-card__title">サインアップ</h1>

          <form class="auth-form">
            <label class="field">
              <span class="field__label">メールアドレス</span>
              <input class="field__input" type="email" placeholder="name@example.com" />
            </label>

            <label class="field">
              <span class="field__label">パスワード</span>
              <input class="field__input" type="password" placeholder="6〜64文字で入力" />
            </label>

            <button class="button button--primary button--block" type="submit">サインアップ</button>
          </form>

          <p class="auth-card__note">
            登録することで、利用規約およびプライバシーポリシーに同意したことになります。
          </p>

          <div class="divider" aria-hidden="true">
            <span></span>
            <p>または</p>
            <span></span>
          </div>

          <div class="auth-socials">
            <button class="button button--social" type="button">Google で続ける</button>
            <button class="button button--social" type="button">Apple で続ける</button>
          </div>

          <p class="auth-card__footer">
            既にアカウントをお持ちですか？
            <a href="./login.html">サインイン</a>
          </p>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
