<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DAILY FOCUS | Frontend Deliverable</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="deliverable-page">
    <main class="deliverable-shell">
      <section class="deliverable-card">
        <p class="deliverable-eyebrow">FRONTEND DELIVERABLE</p>
        <h1>DAILY FOCUS 提出用入口</h1>
        <p>
          完成版として確認する場合は、既存アプリ本体の画面に直接進めます。
          あわせて、提出用に切り出した静的モック画面もこのフォルダに残しています。
        </p>
        <div class="deliverable-actions">
          <a class="button button--primary" href="http://localhost:8080/">完成版アプリを開く</a>
          <a class="button button--secondary" href="http://localhost:8080/login">本体ログイン画面を開く</a>
          <a class="button button--ghost" href="http://localhost:8080/signup">本体会員登録画面を開く</a>
        </div>
        <p>
          下のリンクは、HTML/CSS/JavaScript でまとめた提出用モック画面です。
        </p>
        <div class="deliverable-actions">
          <a class="button button--primary" href="./login.html">モックのログイン画面を見る</a>
          <a class="button button--secondary" href="./signup.html">モックの会員登録画面を見る</a>
          <a class="button button--ghost" href="./dashboard.html">モックの一覧・詳細・編集を見る</a>
        </div>
      </section>
    </main>
  </body>
</html>
