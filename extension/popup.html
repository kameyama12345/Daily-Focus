<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Focus</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <header class="head">
        <div class="kicker">POMODORO</div>
        <div class="mode-row">
          <div class="mode" id="modeText">Focus</div>
          <button class="chip" id="switchModeBtn" type="button">切り替え</button>
        </div>
      </header>

      <main class="main">
        <div class="timer" id="timeText">25:00</div>
        <div class="sub" id="statusText">開始待ち</div>

        <div class="actions">
          <button class="btn btn-primary" id="startPauseBtn" type="button">Start</button>
          <button class="btn btn-ghost" id="resetBtn" type="button" aria-label="Reset">↻</button>
        </div>

        <div class="row">
          <a class="link" href="#" id="openAppLink">Daily Focusを開く</a>
        </div>
      </main>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
